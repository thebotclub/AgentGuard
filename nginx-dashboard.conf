server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://agentguard-api.greenrock-adeab1b0.australiaeast.azurecontainerapps.io https://api.agentguard.tech; img-src 'self' data:; frame-ancestors 'none';" always;

    location / { try_files $uri $uri/ /index.html; }
    location /health { return 200 'ok'; add_header Content-Type text/plain; }
    gzip on;
    gzip_types text/html text/css application/javascript;
}
