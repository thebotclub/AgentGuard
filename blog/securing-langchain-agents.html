    pre {

    code {

      background: rgba(99,102,241,0.12); padding: 0.15em 0.4em;
      border-radius: 3px; color: var(--accent-light);

    pre code { background: none; padding: 0; color: #c4b5fd; font-size: 1em; }

    /* Syntax highlight classes */

    .o { color: #fb923c; } /* operator / special */

    .t { color: #fbbf24; } /* type */
    .p { color: #e2e8f0; } /* punctuation/plain */

    .danger-box { background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.25); border-left: 4px solid var(--danger); border-radius: 6px; padding: 1.25rem 1.5rem; margin: 1.5rem 0; }
    .danger-box .dl { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--danger); margin-bottom: 0.5rem; }
    .danger-box p { margin: 0; font-size: 0.95rem; color: var(--text-muted); }

    .dashboard {

    .dash-status span { font-size: 0.75rem; color: var(--success); font-family: var(--font-sans); }
    .dash-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid rgba(99,102,241,0.08); font-size: 0.8rem; }

    .dash-row .dr-val.warn { color: var(--warning); }
    .dash-row .dr-val.err { color: var(--danger); }
