apiVersion: v2
name: agentguard
description: AgentGuard — Runtime security API for AI agents. Policy enforcement, audit trail, HITL approvals, and dashboard.
type: application
version: 0.9.0
appVersion: "0.9.0"
home: https://agentguard.dev
sources:
  - https://github.com/thebotclub/AgentGuard
maintainers:
  - name: The Bot Club
    url: https://agentguard.dev
keywords:
  - ai
  - security
  - agents
  - policy
  - runtime-security
  - guardrails
dependencies:
  - name: postgresql
    version: "16.4.4"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.6.2"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
