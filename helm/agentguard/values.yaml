# =============================================================================
# AgentGuard Helm Chart — values.yaml
# =============================================================================

# -- Number of AgentGuard replicas
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/0nebot/agentguard
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to Chart appVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []
# - name: acr-secret

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  # -- Create a service account
  create: true
  # -- Annotations for the service account
  annotations: {}
  # -- Service account name (auto-generated if empty)
  name: ""

# =============================================================================
# Application Configuration
# =============================================================================
config:
  # -- Node.js environment
  nodeEnv: production
  # -- Application port
  port: 8080
  # -- Log level (debug, info, warn, error)
  logLevel: info

# =============================================================================
# Secrets
# =============================================================================
secrets:
  # -- Use an existing secret instead of creating one
  existingSecret: ""
  # -- PostgreSQL database URL (ignored if postgresql.enabled=true)
  databaseUrl: ""
  # -- Redis URL (ignored if redis.enabled=true)
  redisUrl: ""
  # -- AgentGuard license key (leave empty for Free tier)
  licenseKey: ""
  # -- API key for agent authentication
  apiKey: ""
  # -- Admin key for management endpoints
  adminKey: ""

# =============================================================================
# Extra Environment Variables
# =============================================================================
# -- Additional environment variables as key-value pairs
extraEnv: {}
#   CUSTOM_VAR: value

# -- Additional environment variables from secrets/configmaps
extraEnvFrom: []
# - secretRef:
#     name: my-extra-secret

# =============================================================================
# PostgreSQL (Bitnami subchart)
# =============================================================================
postgresql:
  # -- Deploy bundled PostgreSQL
  enabled: true
  auth:
    # -- PostgreSQL database name
    database: agentguard
    # -- PostgreSQL username
    username: agentguard
    # -- PostgreSQL password (auto-generated if empty)
    password: ""
    # -- Use existing secret for PostgreSQL password
    existingSecret: ""
  primary:
    persistence:
      # -- Enable PostgreSQL persistence
      enabled: true
      # -- PostgreSQL PVC size
      size: 10Gi

# =============================================================================
# Redis (Bitnami subchart)
# =============================================================================
redis:
  # -- Deploy bundled Redis
  enabled: true
  architecture: standalone
  auth:
    # -- Disable Redis auth for simplicity (enable in production if exposed)
    enabled: false
  master:
    persistence:
      # -- Enable Redis persistence
      enabled: true
      # -- Redis PVC size
      size: 2Gi

# =============================================================================
# Service
# =============================================================================
service:
  # -- Kubernetes service type
  type: ClusterIP
  # -- Service port
  port: 80
  # -- Target port on the container
  targetPort: 8080

# =============================================================================
# Ingress
# =============================================================================
ingress:
  # -- Enable ingress
  enabled: true
  # -- Ingress class name (nginx, traefik, etc.)
  className: nginx
  # -- Ingress annotations
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: agentguard.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: agentguard-tls
      hosts:
        - agentguard.example.com

# =============================================================================
# Resources
# =============================================================================
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# =============================================================================
# Autoscaling (HPA)
# =============================================================================
autoscaling:
  # -- Enable Horizontal Pod Autoscaler
  enabled: false
  # -- Minimum replicas
  minReplicas: 1
  # -- Maximum replicas
  maxReplicas: 5
  # -- Target CPU utilization (%)
  targetCPUUtilizationPercentage: 70
  # -- Target memory utilization (%)
  targetMemoryUtilizationPercentage: 80

# =============================================================================
# Health Checks
# =============================================================================
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 12

# =============================================================================
# Pod Configuration
# =============================================================================
# -- Pod annotations
podAnnotations: {}

# -- Pod labels
podLabels: {}

# -- Pod security context
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
      - ALL

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Topology spread constraints
topologySpreadConstraints: []

# =============================================================================
# Persistence (application data volume)
# =============================================================================
persistence:
  # -- Enable persistent volume for /data
  enabled: true
  # -- Storage class (empty = default)
  storageClass: ""
  # -- Access mode
  accessMode: ReadWriteOnce
  # -- PVC size
  size: 1Gi

# =============================================================================
# Pod Disruption Budget
# =============================================================================
podDisruptionBudget:
  # -- Enable PDB
  enabled: false
  # -- Minimum available pods
  minAvailable: 1

# =============================================================================
# Network Policy
# =============================================================================
networkPolicy:
  # -- Enable network policy
  enabled: false
