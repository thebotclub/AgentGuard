{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentguard.fullname" . }}
  labels:
    {{- include "agentguard.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "agentguard.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.config.port }}
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow PostgreSQL
    - to: []
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis
    - to: []
      ports:
        - protocol: TCP
          port: 6379
    # Allow HTTPS outbound (license validation, webhooks)
    - to: []
      ports:
        - protocol: TCP
          port: 443
{{- end }}
