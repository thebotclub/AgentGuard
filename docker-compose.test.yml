services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentguard_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://test:test@postgres:5432/agentguard_test
      DATABASE_DIRECT_URL: postgresql://test:test@postgres:5432/agentguard_test
      REDIS_URL: redis://redis:6379
      JWT_SECRET: test-jwt-secret-for-e2e-only
      NODE_ENV: test
      PORT: 3001
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/v1/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
