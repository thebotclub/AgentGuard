<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070D17"/>
      <stop offset="100%" stop-color="#0C1825"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#003D52" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#070D17" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#1C3A52"/>
      <stop offset="100%" stop-color="#091520"/>
    </linearGradient>
    <linearGradient id="innerShieldGrad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#0D2336"/>
      <stop offset="100%" stop-color="#060E18"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#80D8EE"/>
      <stop offset="40%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#005A70"/>
    </linearGradient>
    <linearGradient id="innerRimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00D4FF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#7EEEFF"/>
      <stop offset="75%" stop-color="#00D4FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lockBodyGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1ADFFF"/>
      <stop offset="100%" stop-color="#0099BB"/>
    </radialGradient>
    <filter id="outerRimGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scanGlow" x="-40%" y="-400%" width="180%" height="900%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lockGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shieldDepth" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#00D4FF" flood-opacity="0.25"/>
    </filter>
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="44"/>
  <ellipse cx="200" cy="210" rx="150" ry="140" fill="url(#bgGlow)"/>

  <!-- Subtle grid -->
  <g stroke="#00D4FF" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="300" x2="400" y2="300"/><line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
  </g>

  <!-- Outer hex orbit ring -->
  <polygon points="200,44 346,122 346,278 200,356 54,278 54,122"
    fill="none" stroke="#00D4FF" stroke-width="0.8" stroke-opacity="0.12"/>
  <!-- Hex corner ticks -->
  <g stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" opacity="0.45" filter="url(#subtleGlow)">
    <line x1="200" y1="44" x2="212" y2="51"/><line x1="200" y1="44" x2="188" y2="51"/>
    <line x1="346" y1="122" x2="338" y2="136"/>
    <line x1="346" y1="278" x2="338" y2="264"/>
    <line x1="200" y1="356" x2="212" y2="349"/><line x1="200" y1="356" x2="188" y2="349"/>
    <line x1="54" y1="278" x2="62" y2="264"/>
    <line x1="54" y1="122" x2="62" y2="136"/>
  </g>

  <!-- SHIELD — bold, wide, authoritative -->
  <!-- Shield outer path: wide top corners, tapers to sharp point -->
  <!-- Drop shadow -->
  <path d="M 200 76 L 318 114 L 318 224 Q 316 300 200 342 Q 84 300 82 224 L 82 114 Z"
    fill="#040A12" opacity="0.6" transform="translate(4,6)" filter="url(#shieldDepth)"/>

  <!-- Outer shield body -->
  <path d="M 200 76 L 318 114 L 318 224 Q 316 300 200 342 Q 84 300 82 224 L 82 114 Z"
    fill="url(#shieldGrad)"/>

  <!-- Outer rim with glow -->
  <path d="M 200 76 L 318 114 L 318 224 Q 316 300 200 342 Q 84 300 82 224 L 82 114 Z"
    fill="none" stroke="url(#rimGrad)" stroke-width="2.5" filter="url(#outerRimGlow)"/>

  <!-- Top highlight -->
  <path d="M 200 76 L 318 114 L 306 122 L 200 88 L 94 122 L 82 114 Z"
    fill="white" opacity="0.07"/>

  <!-- Inner shield — layered depth -->
  <path d="M 200 96 L 300 130 L 300 222 Q 298 288 200 324 Q 102 288 100 222 L 100 130 Z"
    fill="url(#innerShieldGrad)"/>
  <path d="M 200 96 L 300 130 L 300 222 Q 298 288 200 324 Q 102 288 100 222 L 100 130 Z"
    fill="none" stroke="url(#innerRimGrad)" stroke-width="1.2"/>

  <!-- LOCK — hero element, large and centred -->
  <!-- Shackle arch -->
  <path d="M 172 210 L 172 192 Q 172 162 200 162 Q 228 162 228 192 L 228 210"
    fill="none" stroke="#00D4FF" stroke-width="9" stroke-linecap="round" filter="url(#lockGlow)"/>
  <path d="M 172 210 L 172 192 Q 172 162 200 162 Q 228 162 228 192 L 228 210"
    fill="none" stroke="#7EEEFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="160" y="208" width="80" height="64" rx="12" fill="url(#lockBodyGrad)" filter="url(#lockGlow)"/>
  <rect x="162" y="210" width="76" height="60" rx="11" fill="#0A1E30"/>

  <!-- Lock body highlight sheen -->
  <ellipse cx="185" cy="220" rx="18" ry="9" fill="white" opacity="0.08" transform="rotate(-15 185 220)"/>

  <!-- SCAN LINE through lock body — TBC brand signature -->
  <rect x="156" y="232" width="88" height="18" rx="4" fill="#000810"/>
  <rect x="156" y="232" width="88" height="18" rx="4" fill="url(#scanGrad)" filter="url(#scanGlow)"/>
  <rect x="163" y="239" width="74" height="2" rx="1" fill="white" opacity="0.4"/>

  <!-- Keyhole below scan -->
  <circle cx="200" cy="258" r="7" fill="#00D4FF" opacity="0.9" filter="url(#dotGlow)"/>
  <rect x="197" y="258" width="6" height="10" rx="3" fill="#00D4FF" opacity="0.9" filter="url(#dotGlow)"/>

  <!-- Status dots -->
  <g filter="url(#dotGlow)">
    <circle cx="174" cy="298" r="5" fill="#00D4FF" opacity="1"/>
    <circle cx="190" cy="298" r="4" fill="#00D4FF" opacity="0.4"/>
    <circle cx="206" cy="298" r="4" fill="#00D4FF" opacity="0.4"/>
    <circle cx="222" cy="298" r="5" fill="#00D4FF" opacity="1"/>
  </g>

  <!-- Side panel vents -->
  <g opacity="0.4" filter="url(#subtleGlow)">
    <rect x="84" y="185" width="12" height="3" rx="1.5" fill="#00D4FF"/>
    <rect x="84" y="192" width="8" height="2.5" rx="1.25" fill="#00D4FF" opacity="0.55"/>
    <rect x="304" y="185" width="12" height="3" rx="1.5" fill="#00D4FF"/>
    <rect x="308" y="192" width="8" height="2.5" rx="1.25" fill="#00D4FF" opacity="0.55"/>
  </g>

</svg>
