name: AgentGuard Policy Coverage

on:
  pull_request:
    branches: [main, master, develop]
  # Disabled on push until AGENTGUARD_API_KEY secret is configured
  # push:
  #   branches: [main, master]

jobs:
  agentguard-validate:
    name: Validate Agent Tool Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needed for PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: AgentGuard Policy Coverage Check
        # Non-blocking until AGENTGUARD_API_KEY secret is properly configured
        continue-on-error: true
        uses: ./.github/actions/agentguard-validate
        with:
          api-key: ${{ secrets.AGENTGUARD_API_KEY }}
          api-url: 'https://api.agentguard.tech'
          directory: '.'
          threshold: '100'
          fail-on-uncovered: 'true'
          comment: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
