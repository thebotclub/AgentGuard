name: đźš€ Deploy AgentGuard to Azure

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'landing/**'
      - 'dashboard/**'
      - 'packages/**'
      - 'Dockerfile.*'
      - 'nginx-*.conf'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: agentguardacr
  RESOURCE_GROUP: agentguard-rg

jobs:
  validate:
    name: âś… Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --ignore-scripts
      - run: npm run test
      - name: Type check API
        run: npx tsc --noEmit --esModuleInterop --target ES2022 --module nodenext --moduleResolution nodenext api/server.ts 2>&1 || echo "âš ď¸Ź Type check had warnings (non-blocking)"

  build-deploy:
    name: đźŹ—ď¸Ź Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=true" >> $GITHUB_OUTPUT
            echo "landing=true" >> $GITHUB_OUTPUT
            echo "dashboard=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed files:"
          echo "$CHANGED"
          
          # Detect which components changed
          API=false
          LANDING=false
          DASHBOARD=false
          
          echo "$CHANGED" | grep -qE '^(api/|packages/|Dockerfile\.api|package\.json|package-lock)' && API=true
          echo "$CHANGED" | grep -qE '^(landing/|Dockerfile\.landing|nginx-landing)' && LANDING=true
          echo "$CHANGED" | grep -qE '^(dashboard/|Dockerfile\.dashboard|nginx-dashboard)' && DASHBOARD=true
          
          echo "api=$API" >> $GITHUB_OUTPUT
          echo "landing=$LANDING" >> $GITHUB_OUTPUT
          echo "dashboard=$DASHBOARD" >> $GITHUB_OUTPUT
          
          echo "Deploy: api=$API landing=$LANDING dashboard=$DASHBOARD"

      - name: Build & deploy API
        if: steps.changes.outputs.api == 'true'
        run: |
          echo "đź”¨ Building API image..."
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-api:${{ github.sha }} \
            --image agentguard-api:latest \
            --file Dockerfile.api .
          echo "đźš€ Deploying API..."
          az containerapp update \
            --name agentguard-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-api:${{ github.sha }}
          echo "âś… API deployed: ${{ github.sha }}"

      - name: Build & deploy Landing
        if: steps.changes.outputs.landing == 'true'
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-landing:${{ github.sha }} \
            --image agentguard-landing:latest \
            --file Dockerfile.landing .
          az containerapp update \
            --name agentguard-landing \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-landing:${{ github.sha }}

      - name: Build & deploy Dashboard
        if: steps.changes.outputs.dashboard == 'true'
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-dashboard:${{ github.sha }} \
            --image agentguard-dashboard:latest \
            --file Dockerfile.dashboard .
          az containerapp update \
            --name agentguard-dashboard \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-dashboard:${{ github.sha }}

      - name: Health check
        if: steps.changes.outputs.api == 'true'
        run: |
          echo "âŹł Waiting for API to start (cold start may take ~60s)..."
          sleep 60
          API_URL="https://api.agentguard.tech"
          for i in $(seq 1 12); do
            HEALTH=$(curl -sf --max-time 10 "$API_URL/health" 2>/dev/null)
            if [ $? -eq 0 ]; then
              VERSION=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','?'))" 2>/dev/null)
              echo "âś… API healthy (attempt $i) â€” version $VERSION"
              RESULT=$(curl -s --max-time 10 -X POST "$API_URL/api/v1/evaluate" \
                -H "Content-Type: application/json" \
                -H "X-API-Key: ${{ secrets.AGENTGUARD_API_KEY }}" \
                -d '{"tool":"sudo","params":{"command":"test"}}')
              echo "Smoke test: $RESULT"
              # Also verify unauth is rejected
              UNAUTH=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST "$API_URL/api/v1/evaluate" \
                -H "Content-Type: application/json" \
                -d '{"tool":"test","params":{}}')
              if [ "$UNAUTH" = "401" ]; then
                echo "âś… Auth enforcement verified (unauth â†’ 401)"
              else
                echo "âš ď¸Ź Unauth evaluate returned $UNAUTH (expected 401)"
              fi
              exit 0
            fi
            echo "Attempt $i â€” waiting ${i}0s..."
            sleep $((i * 10))
          done
          echo "::warning::Health check did not respond in time â€” container may still be starting (scale-to-zero cold start)"
          echo "Check manually: curl https://api.agentguard.tech/health"
          exit 0
