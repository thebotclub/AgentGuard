name: 🚀 Deploy AgentGuard to Azure

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'landing/**'
      - 'dashboard/**'
      - 'docs-site/**'
      - 'packages/**'
      - 'Dockerfile.*'
      - 'nginx-*.conf'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: agentguardacr
  RESOURCE_GROUP: agentguard-rg

jobs:
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install --ignore-scripts
      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma
      - name: Build monorepo packages
        run: npx turbo run build
      - name: Security audit
        # Blocking gate — HIGH or CRITICAL CVEs must be resolved before deploy.
        # Change audit-level to 'critical' if you want to allow high-severity through.
        run: npm audit --audit-level=high --omit=dev
      - name: TypeScript type check
        # Blocking gate — type errors must be resolved before deploy.
        # Uses turbo to typecheck each workspace package with its own tsconfig.
        run: npx turbo run typecheck
      - run: npm run test

  build-deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=true" >> $GITHUB_OUTPUT
            echo "landing=true" >> $GITHUB_OUTPUT
            echo "dashboard=true" >> $GITHUB_OUTPUT
            echo "docs=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed files:"
          echo "$CHANGED"
          
          # Detect which components changed
          API=false
          LANDING=false
          DASHBOARD=false
          DOCS=false
          
          echo "$CHANGED" | grep -qE '^(api/|packages/|Dockerfile\.api|package\.json|package-lock)' && API=true
          echo "$CHANGED" | grep -qE '^(landing/|Dockerfile\.landing|nginx-landing)' && LANDING=true
          echo "$CHANGED" | grep -qE '^(dashboard/|Dockerfile\.dashboard|nginx-dashboard)' && DASHBOARD=true
          echo "$CHANGED" | grep -qE '^(docs-site/|Dockerfile\.docs|nginx-docs)' && DOCS=true
          
          echo "api=$API" >> $GITHUB_OUTPUT
          echo "landing=$LANDING" >> $GITHUB_OUTPUT
          echo "dashboard=$DASHBOARD" >> $GITHUB_OUTPUT
          echo "docs=$DOCS" >> $GITHUB_OUTPUT
          
          echo "Deploy: api=$API landing=$LANDING dashboard=$DASHBOARD docs=$DOCS"

      - name: Build & deploy API
        if: steps.changes.outputs.api == 'true'
        run: |
          echo "🔨 Building API image..."
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-api:${{ github.sha }} \
            --image agentguard-api:latest \
            --file Dockerfile.api .
          echo "🚀 Deploying API..."
          az containerapp update \
            --name agentguard-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-api:${{ github.sha }} \
            --min-replicas 1 \
            --max-replicas 3 \
            --set-env-vars \
              "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
              "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              "JWT_SECRET=${{ secrets.JWT_SECRET }}"
          echo "✅ API deployed (min 1 replica — no cold start): ${{ github.sha }}"

      - name: Build & deploy Landing
        if: steps.changes.outputs.landing == 'true'
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-landing:${{ github.sha }} \
            --image agentguard-landing:latest \
            --file Dockerfile.landing .
          az containerapp update \
            --name agentguard-landing \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-landing:${{ github.sha }}

      - name: Build & deploy Dashboard
        if: steps.changes.outputs.dashboard == 'true'
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-dashboard:${{ github.sha }} \
            --image agentguard-dashboard:latest \
            --file Dockerfile.dashboard .
          az containerapp update \
            --name agentguard-dashboard \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-dashboard:${{ github.sha }}

      - name: Build & deploy Docs
        if: steps.changes.outputs.docs == 'true'
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-docs:${{ github.sha }} \
            --image agentguard-docs:latest \
            --file Dockerfile.docs .
          az containerapp update \
            --name agentguard-docs \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-docs:${{ github.sha }} \
            --min-replicas 1 \
            --max-replicas 2

      - name: Health check
        if: steps.changes.outputs.api == 'true'
        run: |
          set +e
          echo "⏳ Waiting for API to start (cold start may take ~60s)..."
          sleep 60
          API_URL="https://api.agentguard.tech"
          for i in $(seq 1 12); do
            HEALTH=$(curl -sf --max-time 10 "$API_URL/health" 2>/dev/null)
            if [ $? -eq 0 ]; then
              VERSION=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','?'))" 2>/dev/null)
              echo "✅ API healthy (attempt $i) — version $VERSION"
              RESULT=$(curl -s --max-time 10 -X POST "$API_URL/api/v1/evaluate" \
                -H "Content-Type: application/json" \
                -H "X-API-Key: ${{ secrets.AGENTGUARD_API_KEY }}" \
                -d '{"tool":"sudo","params":{"command":"test"}}')
              echo "Smoke test: $RESULT"
              # Also verify unauth is rejected
              UNAUTH=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST "$API_URL/api/v1/evaluate" \
                -H "Content-Type: application/json" \
                -d '{"tool":"test","params":{}}')
              if [ "$UNAUTH" = "401" ]; then
                echo "✅ Auth enforcement verified (unauth → 401)"
              else
                echo "⚠️ Unauth evaluate returned $UNAUTH (expected 401)"
              fi
              exit 0
            fi
            echo "Attempt $i — waiting ${i}0s..."
            sleep $((i * 10))
          done
          echo "::warning::Health check did not respond in time — container may still be starting (scale-to-zero cold start)"
          echo "Check manually: curl https://api.agentguard.tech/health"
          exit 0

      - name: Smoke test
        continue-on-error: true
        timeout-minutes: 3
        run: |
          sleep 60
          for site in api.agentguard.tech agentguard.tech app.agentguard.tech docs.agentguard.tech; do
            code=$(curl -so /dev/null -w "%{http_code}" --max-time 10 "https://$site" 2>/dev/null || echo "000")
            echo "$site: $code"
            if [ "$code" = "000" ]; then echo "::warning::$site unreachable"; fi
          done
