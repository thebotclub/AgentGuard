name: 🚀 Deploy AgentGuard to Azure

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'landing/**'
      - 'dashboard/**'
      - 'packages/**'
      - 'Dockerfile.*'
      - 'nginx-*.conf'
      - 'package.json'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: agentguardacr
  RESOURCE_GROUP: agentguard-rg

jobs:
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --ignore-scripts
      - run: npm run test
      - run: npx tsx --version
      - name: Type check API
        run: npx tsc --noEmit --esModuleInterop --target ES2022 --module nodenext --moduleResolution nodenext api/server.ts 2>/dev/null || echo "⚠️ Type check had warnings (non-blocking)"

  build-deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=true" >> $GITHUB_OUTPUT
            echo "landing=true" >> $GITHUB_OUTPUT
            echo "dashboard=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "api=false" >> $GITHUB_OUTPUT
          echo "landing=false" >> $GITHUB_OUTPUT
          echo "dashboard=false" >> $GITHUB_OUTPUT
          echo "$CHANGED" | grep -qE '^(api/|packages/|Dockerfile\.api|package\.json)' && echo "api=true" >> $GITHUB_OUTPUT || true
          echo "$CHANGED" | grep -qE '^(landing/|Dockerfile\.landing|nginx-landing)' && echo "landing=true" >> $GITHUB_OUTPUT || true
          echo "$CHANGED" | grep -qE '^(dashboard/|Dockerfile\.dashboard|nginx-dashboard)' && echo "dashboard=true" >> $GITHUB_OUTPUT || true

      - name: Build & deploy API
        if: steps.changes.outputs.api == 'true'
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-api:${{ github.sha }} \
            --image agentguard-api:latest \
            --file Dockerfile.api .
          az containerapp update \
            --name agentguard-api \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-api:${{ github.sha }}

      - name: Build & deploy Landing
        if: steps.changes.outputs.landing == 'true'
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-landing:${{ github.sha }} \
            --image agentguard-landing:latest \
            --file Dockerfile.landing .
          az containerapp update \
            --name agentguard-landing \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-landing:${{ github.sha }}

      - name: Build & deploy Dashboard
        if: steps.changes.outputs.dashboard == 'true'
        run: |
          az acr build --registry ${{ env.ACR_NAME }} \
            --image agentguard-dashboard:${{ github.sha }} \
            --image agentguard-dashboard:latest \
            --file Dockerfile.dashboard .
          az containerapp update \
            --name agentguard-dashboard \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/agentguard-dashboard:${{ github.sha }}

      - name: Health check
        run: |
          sleep 30
          API_URL="https://agentguard-api.greenrock-adeab1b0.australiaeast.azurecontainerapps.io"
          for i in $(seq 1 10); do
            if curl -sf "$API_URL/health" -o /dev/null; then
              echo "✅ API healthy (attempt $i)"
              # Quick smoke test
              RESULT=$(curl -s -X POST "$API_URL/api/v1/evaluate" \
                -H "Content-Type: application/json" \
                -d '{"tool":"sudo","params":{"command":"test"}}')
              echo "Smoke test: $RESULT"
              exit 0
            fi
            echo "Attempt $i — waiting..."
            sleep $((i * 3))
          done
          echo "::error::Health check failed"
          exit 1
