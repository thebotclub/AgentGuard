name: Test & Coverage

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: Build workspace packages
        run: npx turbo run build

      - name: Audit dependencies for HIGH/CRITICAL vulnerabilities
        # Audit step — informational only. Does not block CI.
        # Next.js 15.1.3 has known CVEs (including 1 critical) that cannot
        # be resolved without upgrading to 15.5.x, which breaks React 19
        # static prerender. All non-Next.js vulnerabilities have been
        # resolved. Dependabot tracks new advisories.
        run: npm audit || true

      - name: TypeScript type check
        # Mandatory gate — catches type errors before they reach production.
        # Uses turbo to typecheck each workspace package with its own tsconfig.
        run: npx turbo run typecheck

      - name: OpenAPI spec sync check
        # Ensures the checked-in openapi.json matches the source openapi.yaml.
        # Run `npm run openapi:generate` locally if this step fails.
        run: |
          npm run openapi:generate
          git diff --exit-code api/openapi.json || (echo '::error::OpenAPI spec out of sync. Run npm run openapi:generate and commit.' && exit 1)

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: E2E tests
        # Runs tests/e2e.test.ts — self-manages server lifecycle (starts/stops on localhost:3001).
        # Uses Node.js built-in test runner via tsx. No external framework required.
        # Non-blocking: server startup depends on env config (DB, Redis) not available in CI yet.
        continue-on-error: true
        run: npm run test:e2e
        env:
          NODE_ENV: test

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Coverage summary comment (PR only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
