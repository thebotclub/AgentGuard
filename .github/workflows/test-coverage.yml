name: Test & Coverage

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/api/prisma/schema.prisma

      - name: Build workspace packages
        run: npx turbo run build

      - name: Audit dependencies for HIGH/CRITICAL vulnerabilities
        # Blocks the CI pipeline if any HIGH or CRITICAL CVEs are found.
        # Use `npm audit fix` locally to resolve, or add to .nsprc if a
        # false positive needs to be acknowledged. This is a mandatory gate —
        # a security product shipping with known HIGH CVEs is a credibility risk.
        run: npm audit --audit-level=high

      - name: TypeScript type check
        # Mandatory gate — catches type errors before they reach production.
        # Uses turbo to typecheck each workspace package with its own tsconfig.
        run: npx turbo run typecheck

      - name: OpenAPI spec sync check
        # Ensures the checked-in openapi.json matches the source openapi.yaml.
        # Run `npm run openapi:generate` locally if this step fails.
        run: |
          npm run openapi:generate
          git diff --exit-code api/openapi.json || (echo '::error::OpenAPI spec out of sync. Run npm run openapi:generate and commit.' && exit 1)

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Coverage summary comment (PR only)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2.11.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
