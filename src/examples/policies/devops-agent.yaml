# AgentGuard Policy: DevOps Agent
# Scope: Infrastructure reads, CI/CD triggering, no destructive operations.
# Compliance: SOC 2, change-management controls

id: devops-agent-v1
version: 1.0.0
description: >
  DevOps automation agent. May inspect infrastructure state and trigger
  safe CI/CD actions. Explicitly denied from destroying resources or
  modifying production secrets. High-risk operations (production deploys,
  config changes) require human approval. API calls are rate-limited to
  prevent runaway automation.

tools:
  allow:
    - infra:read_status
    - infra:read_logs
    - infra:read_metrics
    - infra:read_config
    - k8s:get
    - k8s:list
    - k8s:describe
    - k8s:logs
    - ci:trigger_build
    - ci:read_pipeline
    - ci:read_artifact
    - git:read
    - git:clone
    - monitoring:query
    - monitoring:read_alerts
    - search:internal
  deny:
    - infra:delete
    - infra:destroy
    - k8s:delete
    - k8s:drain
    - db:drop
    - db:delete
    - db:truncate
    - secrets:write
    - secrets:delete
    - iam:delete
    - iam:modify_permissions
    - "*.delete"         # Glob: deny any tool ending in .delete
    - "*.destroy"        # Glob: deny any tool ending in .destroy

dataAccess:
  allowedClassifications:
    - public
    - internal
    - ops-confidential
  deniedDatasets:
    - production-secrets
    - customer-data
    - pii-store
  allowExport: false
  allowPII: false

rateLimits:
  globalCallsPerMinute: 120
  perTool:
    ci:trigger_build: 10        # Prevent runaway build triggering
    infra:read_logs: 30         # Log reads can be expensive
    monitoring:query: 40

spending:
  maxTotalUsd: 200.00
  maxPerActionUsd: 20.00
  currency: USD

humanInTheLoop:
  requireApprovalFor:
    - infra:apply_change
    - infra:restart
    - k8s:rollout
    - k8s:scale
    - ci:deploy_production
    - ci:promote
    - config:write
  timeoutSeconds: 300

defaultAction: deny
