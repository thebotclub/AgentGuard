{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentguard.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentguard.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if and (not .Values.postgresql.enabled) .Values.secrets.databaseUrl }}
  database-url: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  {{- end }}
  {{- if and (not .Values.redis.enabled) .Values.secrets.redisUrl }}
  redis-url: {{ .Values.secrets.redisUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.redisSentinels }}
  redis-sentinels: {{ .Values.secrets.redisSentinels | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.redisPassword }}
  redis-password: {{ .Values.secrets.redisPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.redisSentinelPassword }}
  redis-sentinel-password: {{ .Values.secrets.redisSentinelPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.licenseKey }}
  license-key: {{ .Values.secrets.licenseKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.apiKey }}
  api-key: {{ .Values.secrets.apiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.adminKey }}
  admin-key: {{ .Values.secrets.adminKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeWebhookSecret }}
  stripe-webhook-secret: {{ .Values.secrets.stripeWebhookSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.slackSigningSecret }}
  slack-signing-secret: {{ .Values.secrets.slackSigningSecret | b64enc | quote }}
  {{- end }}
{{- end }}
