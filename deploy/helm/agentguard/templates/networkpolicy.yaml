{{- if .Values.networkPolicy.enabled }}
---
# NetworkPolicy for API pods
# Allows: ingress from load balancer, egress to DB/Redis/DNS/HTTPS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentguard.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentguard.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      {{- include "agentguard.api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.api.port }}
      {{- if or .Values.networkPolicy.ingressNamespaceSelector .Values.networkPolicy.ingressPodSelector }}
      from:
        {{- if .Values.networkPolicy.ingressNamespaceSelector }}
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 12 }}
        {{- end }}
        {{- if .Values.networkPolicy.ingressPodSelector }}
        - podSelector:
            {{- toYaml .Values.networkPolicy.ingressPodSelector | nindent 12 }}
        {{- end }}
      {{- end }}
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Redis / Sentinel
    - ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
    # HTTPS outbound (license validation, webhooks, Stripe, Slack)
    - ports:
        - protocol: TCP
          port: 443
    # HTTP outbound (webhook delivery to customer URLs on port 80)
    - ports:
        - protocol: TCP
          port: 80

{{- if .Values.worker.enabled }}
---
# NetworkPolicy for Worker pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentguard.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentguard.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  podSelector:
    matchLabels:
      {{- include "agentguard.worker.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []   # Workers expose no ports
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL
    - ports:
        - protocol: TCP
          port: 5432
    # Redis / Sentinel
    - ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
    # HTTPS outbound (webhook delivery)
    - ports:
        - protocol: TCP
          port: 443
    - ports:
        - protocol: TCP
          port: 80
{{- end }}

{{- if .Values.dashboard.enabled }}
---
# NetworkPolicy for Dashboard pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentguard.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentguard.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  podSelector:
    matchLabels:
      {{- include "agentguard.dashboard.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.dashboard.port }}
  egress:
    # DNS only — dashboard is a static SPA, no server-side API calls
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- end }}
