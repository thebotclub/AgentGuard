{{- if .Values.api.podDisruptionBudget.enabled }}
---
# PodDisruptionBudget for API
# Prevents simultaneous termination of all API pods during node drain / upgrades
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agentguard.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agentguard.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: {{ .Values.api.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "agentguard.api.selectorLabels" . | nindent 6 }}
{{- end }}

